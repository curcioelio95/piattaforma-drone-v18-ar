<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Modello AR</title>
  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js">
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #080c18; overflow: hidden;
                  font-family: 'Segoe UI', sans-serif; }
    model-viewer {
      width: 100%; height: 100%;
      background-color: #080c18;
      --poster-color: #080c18;
    }
    model-viewer::part(ar-button) {
      background: linear-gradient(135deg, #e94560, #c73652);
      color: #fff; border: none; border-radius: 28px;
      padding: 14px 32px; font-size: 16px; font-weight: 700;
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 8px 32px rgba(233,69,96,0.5);
    }
    .badge {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(17,24,39,0.85); backdrop-filter: blur(12px);
      border: 1px solid #1e3a5f; border-radius: 20px;
      padding: 8px 20px; color: #f1f5f9; font-size: 13px;
      white-space: nowrap; pointer-events: none;
    }
  </style>
</head>
<body>
  <model-viewer
    src="modello.glb"
    ios-src="modello.usdz"
    alt="Modello 3D"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    auto-rotate-delay="800"
    rotation-per-second="12deg"
    shadow-intensity="1.2"
    exposure="1.1"
    environment-image="neutral"
    tone-mapping="commerce">
  </model-viewer>
  <div class="badge">Trascina · Pizzica per zoom · Tocca AR per la realtà aumentata</div>
</body>
</html>
